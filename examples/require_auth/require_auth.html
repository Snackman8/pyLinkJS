<head>
    <!-- jquery (requires for pyLinkJS) -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.1/dist/jquery.min.js"></script>

    <!-- bootstrap (requires for pyLinkJS UI Helpers) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body style='padding: 20px;'>
<h1>PyLinkJS Require Auth Example</h1>
<br>
<div class="alert alert-info" style="max-width: 800px;">
    This example enables <code>require_auth=True</code> with the development auth plugin.
    If you open this page while logged out, pylinkjs will redirect you to <code>/login</code> and then return you here after sign in.
</div>
<br>
<a href='./logout' id=logout_link>Logout</a>
<br>
<br>
<pre>
User Name: <span id=user_name>?</span>
Auth Method: <span id=auth_method>?</span>
</pre>
</body>
